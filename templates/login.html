<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Hostel App</title>
    <style>
        body { font-family: monospace; background: #fff; color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #000; padding: 40px; width: 300px; }
        h2 { text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        input, button { width: 100%; padding: 10px; margin-top: 20px; border: 1px solid #000; font-family: inherit; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; }
        button:hover { background: #fff; color: #000; }
        .link { margin-top: 15px; display: block; font-size: 0.8em; text-align: center; color: #000; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Enter System</button>
        </form>
        <a href="/register_page" class="link">Don't have an account? Register</a>
    </div>
</body>
</html>
