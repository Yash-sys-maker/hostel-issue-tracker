<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Issue Board</title>
    
<style>
    :root {
        --bg: #ffffff;
        --text: #000000;
        --border: #000000;
    }

    body {
        font-family: 'Courier New', Courier, monospace; /* Engineer-style font */
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
    }

    .container { width: 100%; max-width: 700px; }

    /* Clean Navbar */
    nav { 
        display: flex; 
        justify-content: space-between; 
        border: 2px solid var(--border); 
        padding: 15px; 
        margin-bottom: 40px;
        font-size: 0.9em;
    }

    h1 { text-align: left; text-transform: uppercase; letter-spacing: 4px; border-bottom: 4px solid var(--border); padding-bottom: 10px; }

    /* Modernized Forms */
    .submit-section { border: 2px solid var(--border); padding: 25px; margin-bottom: 40px; }
    input, textarea, select, button { 
        width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 12px; 
        border: 2px solid var(--border); background: var(--bg); font-family: inherit; font-weight: bold;
    }

    button { background: var(--text); color: var(--bg); cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    button:hover { background: var(--bg); color: var(--text); }

    /* Filter Bar */
    .filter-bar { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
    .filter-btn { width: auto; padding: 5px 15px; font-size: 0.8em; }

    /* Issue Cards - Premium Look */
    .issue-card { 
        border: 2px solid var(--border); padding: 20px; margin-bottom: 20px; 
        display: flex; justify-content: space-between; align-items: flex-start;
    }
    .status-tag { 
        display: inline-block; padding: 2px 8px; border: 1px solid var(--border); 
        font-size: 0.7em; text-transform: uppercase; margin-bottom: 10px;
    }
    .resolved { background: #000; color: #fff; }

    .issue-details h3 { margin: 5px 0; text-transform: uppercase; }
    .issue-meta { font-size: 0.8em; opacity: 0.7; }
</style>

</head>
<body>

    <div class="container">

        <nav style="display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
    <div>
        <strong>User:</strong> <span id="displayUser">...</span> | 
        <strong>Role:</strong> <span id="displayRole">...</span>
    </div>
    <div>
        <a href="/logout" style="color: #000; font-weight: bold; text-decoration: none; border: 1px solid #000; padding: 2px 8px;">LOGOUT</a>
    </div>
</nav>

        <h1>Hostel Issue Board</h1>

        <div class="submit-section">
            <h2>Report an Issue</h2>
            <form id="issueForm">
                <input type="text" id="roomNumber" placeholder="Room Number (e.g., 104)" required>
                <input type="text" id="issueTitle" placeholder="Issue Title (e.g., Broken Fan)" required>
                <textarea id="issueDesc" rows="3" placeholder="Describe the problem..." required></textarea>
                <button type="submit">Submit Issue</button>
            </form>
        </div>

        <h2>Current Issues</h2>
<div class="filter-bar">
    <strong>FILTER:</strong>
    <button class="filter-btn" onclick="loadIssues('all')">ALL</button>
    <button class="filter-btn" onclick="loadIssues('open')">OPEN</button>
    <button class="filter-btn" onclick="loadIssues('resolved')">RESOLVED</button>
</div>

        <div id="issueFeed">
            </div>
    </div>

    <script>
    const issueForm = document.getElementById('issueForm');
    const issueFeed = document.getElementById('issueFeed');

    // 1. Display user info (Passed from Python)
    document.getElementById('displayUser').innerText = "{{ username }}";
    document.getElementById('displayRole').innerText = "{{ role }}";

    // 2. THE MISSING PIECE: The function that talks to the backend
    async function resolveIssue(issueId) {
        console.log("Attempting to resolve issue:", issueId);
        
        const response = await fetch(`/resolve_issue/${issueId}`, {
            method: 'POST'
        });

        if (response.ok) {
            console.log("Success! Refreshing feed...");
            loadIssues(); // Refresh the list to show the checkmark
        } else {
            const error = await response.json();
            alert("Error: " + error.message);
        }
    }

    async function upvoteIssue(issueId) {
    const response = await fetch(`/upvote_issue/${issueId}`, {
        method: 'POST'
    });

    if (response.ok) {
        loadIssues(); 
    } else {
        const result = await response.json();
        if (result.message === "You have already upvoted this!") {
            alert("Limit reached: You can only upvote an issue once.");
        }
    }
}

    // 3. Function to load and display issues
    async function loadIssues(filter = 'all') {
    const response = await fetch('/get_issues');
    let issues = await response.json();
    
    // Apply filter logic
    if (filter !== 'all') {
        issues = issues.filter(i => i.status === filter);
    }

    issueFeed.innerHTML = ''; 

    issues.forEach(issue => {
        const card = document.createElement('div');
        card.className = 'issue-card';
        
        const isAdmin = "{{ role }}" === "admin";
        const isResolved = issue.status === 'resolved';
        
        const resolveBtn = (isAdmin && !isResolved) 
            ? `<button onclick="resolveIssue(${issue.id})" class="filter-btn">RESOLVE</button>` 
            : "";

        card.innerHTML = `
            <div class="issue-details">
                <div class="status-tag ${isResolved ? 'resolved' : ''}">${issue.status}</div>
                <h3>${issue.title}</h3>
                <p>${issue.description}</p>
                <span class="issue-meta">ROOM ${issue.room_number} | ID #${issue.id}</span>
                <br>${resolveBtn}
            </div>
            <div>
                <button class="upvote-btn" onclick="upvoteIssue(${issue.id})">▲ ${issue.upvotes}</button>
            </div>
        `;
        issueFeed.appendChild(card);
    });
}

    // 4. Handle form submission
    issueForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const room = document.getElementById('roomNumber').value;
        const title = document.getElementById('issueTitle').value;
        const desc = document.getElementById('issueDesc').value;

        const response = await fetch('/add_issue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room, title, desc })
        });

        if (response.ok) {
            issueForm.reset();
            loadIssues(); // This makes the new issue appear instantly!
        }
    });

    // Run on page load
    loadIssues();
</script>

</body>
</html>
