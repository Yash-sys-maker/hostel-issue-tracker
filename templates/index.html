<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Issue Board</title>
    <style>
        /* Strict high-contrast black and white styling */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
        }

        body {
            font-family: monospace, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .submit-section {
            border: 2px solid var(--border-color);
            padding: 20px;
            margin-bottom: 30px;
            background-color: var(--bg-color);
        }

        .submit-section h2 {
            margin-top: 0;
        }

        input, textarea, button {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid var(--border-color);
            font-family: inherit;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        button {
            background-color: var(--text-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--text-color);
        }

        .issue-card {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-color);
        }

        .issue-details h3 {
            margin: 0 0 5px 0;
        }

        .issue-meta {
            font-size: 0.85em;
            font-weight: bold;
        }

        .upvote-btn {
            width: auto;
            margin-bottom: 0;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <div class="container">

        <nav style="display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
    <div>
        <strong>User:</strong> <span id="displayUser">...</span> | 
        <strong>Role:</strong> <span id="displayRole">...</span>
    </div>
    <div>
        <a href="/logout" style="color: #000; font-weight: bold; text-decoration: none; border: 1px solid #000; padding: 2px 8px;">LOGOUT</a>
    </div>
</nav>

        <h1>Hostel Issue Board</h1>

        <div class="submit-section">
            <h2>Report an Issue</h2>
            <form id="issueForm">
                <input type="text" id="roomNumber" placeholder="Room Number (e.g., 104)" required>
                <input type="text" id="issueTitle" placeholder="Issue Title (e.g., Broken Fan)" required>
                <textarea id="issueDesc" rows="3" placeholder="Describe the problem..." required></textarea>
                <button type="submit">Submit Issue</button>
            </form>
        </div>

        <h2>Current Issues</h2>
        <div id="issueFeed">
            </div>
    </div>

    <script>
    const issueForm = document.getElementById('issueForm');
    const issueFeed = document.getElementById('issueFeed');

    // 1. Display user info (Passed from Python)
    document.getElementById('displayUser').innerText = "{{ username }}";
    document.getElementById('displayRole').innerText = "{{ role }}";

    // 2. THE MISSING PIECE: The function that talks to the backend
    async function resolveIssue(issueId) {
        console.log("Attempting to resolve issue:", issueId);
        
        const response = await fetch(`/resolve_issue/${issueId}`, {
            method: 'POST'
        });

        if (response.ok) {
            console.log("Success! Refreshing feed...");
            loadIssues(); // Refresh the list to show the checkmark
        } else {
            const error = await response.json();
            alert("Error: " + error.message);
        }
    }

    // 3. Function to load and display issues
    async function loadIssues() {
        const response = await fetch('/get_issues');
        const issues = await response.json();
        
        issueFeed.innerHTML = ''; 

        issues.forEach(issue => {
            const card = document.createElement('div');
            card.className = 'issue-card';
            
            const isAdmin = "{{ role }}" === "admin";
            
            // Logic for the resolve button appearance
            const resolveBtn = (isAdmin && issue.status !== 'resolved') 
                ? `<button onclick="resolveIssue(${issue.id})" class="upvote-btn" style="background:white; color:black; border:1px solid black; margin-top:10px;">RESOLVE</button>` 
                : "";

            card.innerHTML = `
                <div class="issue-details">
                    <h3>${issue.title} ${issue.status === 'resolved' ? '✅' : ''}</h3>
                    <p>${issue.description}</p>
                    <span class="issue-meta">Room: ${issue.room_number} | Status: ${issue.status}</span>
                    <br>
                    ${resolveBtn}
                </div>
                <div>
                    <button class="upvote-btn">▲ ${issue.upvotes}</button>
                </div>
            `;
            issueFeed.appendChild(card);
        });
    }

    // 4. Handle form submission
    issueForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const room = document.getElementById('roomNumber').value;
        const title = document.getElementById('issueTitle').value;
        const desc = document.getElementById('issueDesc').value;

        const response = await fetch('/add_issue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room, title, desc })
        });

        if (response.ok) {
            issueForm.reset();
            loadIssues(); // This makes the new issue appear instantly!
        }
    });

    // Run on page load
    loadIssues();
</script>

</body>
</html>
