<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Issue Board</title>
    <style>
        /* Strict high-contrast black and white styling */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
        }

        body {
            font-family: monospace, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .submit-section {
            border: 2px solid var(--border-color);
            padding: 20px;
            margin-bottom: 30px;
            background-color: var(--bg-color);
        }

        .submit-section h2 {
            margin-top: 0;
        }

        input, textarea, button {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid var(--border-color);
            font-family: inherit;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        button {
            background-color: var(--text-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--text-color);
        }

        .issue-card {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-color);
        }

        .issue-details h3 {
            margin: 0 0 5px 0;
        }

        .issue-meta {
            font-size: 0.85em;
            font-weight: bold;
        }

        .upvote-btn {
            width: auto;
            margin-bottom: 0;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hostel Issue Board</h1>

        <div class="submit-section">
            <h2>Report an Issue</h2>
            <form id="issueForm">
                <input type="text" id="roomNumber" placeholder="Room Number (e.g., 104)" required>
                <input type="text" id="issueTitle" placeholder="Issue Title (e.g., Broken Fan)" required>
                <textarea id="issueDesc" rows="3" placeholder="Describe the problem..." required></textarea>
                <button type="submit">Submit Issue</button>
            </form>
        </div>

        <h2>Current Issues</h2>
        <div id="issueFeed">
            </div>
    </div>

    <script>
    const issueForm = document.getElementById('issueForm');
    const issueFeed = document.getElementById('issueFeed');

    // Function to handle form submission
    issueForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Stop the page from refreshing

        const room = document.getElementById('roomNumber').value;
        const title = document.getElementById('issueTitle').value;
        const desc = document.getElementById('issueDesc').value;

        // Send data to Python (We will build this 'add_issue' route next)
        const response = await fetch('/add_issue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room, title, desc })
        });

        if (response.ok) {
            alert("Issue reported to the system!");
            issueForm.reset();
            // We would call a function here to refresh the feed
        }
    });

    // Function to load issues from the backend
async function loadIssues() {
    const response = await fetch('/get_issues');
    const issues = await response.json();
    
    issueFeed.innerHTML = ''; // Clear the current list

    issues.forEach(issue => {
        const card = document.createElement('div');
        card.className = 'issue-card';
        card.innerHTML = `
            <div class="issue-details">
                <h3>${issue.title}</h3>
                <p>${issue.description}</p>
                <span class="issue-meta">Room: ${issue.room_number}</span>
            </div>
            <div>
                <button class="upvote-btn">▲ ${issue.upvotes}</button>
            </div>
        `;
        issueFeed.appendChild(card);
    });
}

// Run this function every time the page loads
loadIssues();
</script>

</body>
</html>
