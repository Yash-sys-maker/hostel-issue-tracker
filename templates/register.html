<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - Hostel Management</title>
    <style>
        /* [Use the exact same CSS as login.html above for consistency] */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }
        h2 { margin-top: 0; font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 2rem; }
        input, select {
            width: 100%; padding: 12px 16px; margin-bottom: 1.25rem;
            border: 1px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 1rem; box-sizing: border-box; background: white;
        }
        button {
            width: 100%; background: var(--primary); color: white; padding: 12px;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-size: 1rem; transition: 0.2s;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #64748b; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Create Account</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Choose Username" required>
            <input type="password" id="password" placeholder="Choose Password" required>
            <select id="role">
                <option value="student">I am a Student</option>
                <option value="admin">I am Maintenance Staff</option>
            </select>
            <button type="submit">Get Started</button>
        </form>
        <div class="footer-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });

            if (response.ok) {
                alert("Account created successfully!");
                window.location.href = '/login';
            } else {
                const result = await response.json();
                alert(result.message);
            }
        });
    </script>
</body>
</html>
