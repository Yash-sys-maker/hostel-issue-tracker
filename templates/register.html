<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Hostel App</title>
    <style>
        body { font-family: monospace; background: #fff; color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-box { border: 2px solid #000; padding: 40px; width: 300px; }
        h2 { text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 20px; border: 1px solid #000; font-family: inherit; box-sizing: border-box; background: #fff; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; }
        button:hover { background: #fff; color: #000; }
        .link { margin-top: 15px; display: block; font-size: 0.8em; text-align: center; color: #000; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Choose Username" required>
            <input type="password" id="password" placeholder="Choose Password" required>
            <select id="role">
                <option value="student">Student</option>
                <option value="admin">Maintenance Admin</option>
            </select>
            <button type="submit">Create Account</button>
        </form>
        <a href="/login" class="link">Already have an account? Login</a>
    </div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        const response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, role })
        });

        const result = await response.json();
        if (response.ok) {
            alert("Account created! Now you can login.");
            window.location.href = '/login';
        } else {
            alert(result.message);
        }
    });
</script>

</body>
</html>
